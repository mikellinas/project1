services:
  postgres:
    image: postgres:16-alpine
    container_name: project1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: project1_user
      POSTGRES_PASSWORD: project1_pass
      POSTGRES_DB: project1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
